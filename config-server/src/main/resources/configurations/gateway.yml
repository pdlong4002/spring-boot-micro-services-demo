# Cấu hình cho API Gateway
server:
  port: 8222

spring:
  application:
    name: gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        - id: students
          uri: lb://students
          predicates:
            - Path=/api/v1/students/**

        - id: schools
          uri: lb://schools
          predicates:
            - Path=/api/v1/schools/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true